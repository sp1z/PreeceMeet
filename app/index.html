<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; connect-src 'self' https: wss:; media-src 'self' blob:; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'"
    />
    <title>PreeceMeet</title>

    <!-- Splash CSS + dark body bg lives inline so the very first paint is
         already on-brand. CSP allows 'unsafe-inline' style which we already
         use throughout the app. -->
    <style>
      html, body { margin: 0; background: #06091e; color: #f4f7ff; }
      #root { height: 100vh; }

      /* ── Boot splash (inline so it paints with the HTML) ───────────────── */
      #pm-boot-splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 22px;
        background:
          radial-gradient(1100px 700px at 50% -8%, #15205a55, transparent 60%),
          radial-gradient(900px 600px at 88% 18%, #0e3a6633, transparent 55%),
          linear-gradient(170deg, #05091f, #0a0e2e 60%, #070b22);
        font-family: 'Manrope', system-ui, -apple-system, sans-serif;
        color: #f4f7ff;
        opacity: 1;
        visibility: visible;
        transition: opacity 0.45s ease, visibility 0.45s ease;
      }
      #pm-boot-splash.fade {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      #pm-boot-splash svg { display: block; }

      /* Subtle circuit-grid overlay behind the mark, matches identity board. */
      #pm-boot-splash::before {
        content: '';
        position: absolute;
        inset: 0;
        opacity: 0.5;
        pointer-events: none;
        background-image:
          linear-gradient(#ffffff08 1px, transparent 1px),
          linear-gradient(90deg, #ffffff08 1px, transparent 1px);
        background-size: 54px 54px;
        -webkit-mask-image: radial-gradient(circle at 50% 40%, #000 0%, transparent 72%);
                mask-image: radial-gradient(circle at 50% 40%, #000 0%, transparent 72%);
      }

      .pm-bs-mark-wrap {
        position: relative;
        width: 180px;
        height: 180px;
        z-index: 1;
      }
      .pm-bs-halo {
        position: absolute;
        inset: -26%;
        background: radial-gradient(circle, #38d8ff5e, transparent 64%);
        filter: blur(14px);
        animation: pmBsPulse 5s ease-in-out infinite;
      }
      @keyframes pmBsPulse {
        0%, 100% { opacity: .4; transform: scale(1); }
        50%      { opacity: .78; transform: scale(1.07); }
      }

      .pm-bs-hex-body {
        opacity: 0;
        transform-origin: 256px 256px;
        transform: scale(.85);
        animation: pmBsHexIn 0.55s 0.1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
      }
      .pm-bs-circuit {
        opacity: 0;
        animation: pmBsFadeIn 0.6s 0.4s ease-out forwards;
      }
      .pm-bs-lens {
        opacity: 0;
        transform-origin: 240px 256px;
        transform: scale(.4);
        animation: pmBsLensPop 0.5s 0.55s cubic-bezier(0.5, 1.5, 0.5, 1) forwards;
      }
      .pm-bs-hex-border {
        opacity: 0;
        stroke-dasharray: 1600;
        stroke-dashoffset: 1600;
        animation: pmBsBorderDraw 0.9s 0.7s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
      }
      .pm-bs-notch {
        opacity: 0;
        transform-origin: center;
        transform: scale(0);
        animation: pmBsNotchPop 0.35s cubic-bezier(0.4, 1.8, 0.5, 1) forwards;
      }
      .pm-bs-notch-1 { animation-delay: 1.05s; transform-origin: 212px 83px; }
      .pm-bs-notch-2 { animation-delay: 1.15s; transform-origin: 256px 83px; }
      .pm-bs-notch-3 { animation-delay: 1.25s; transform-origin: 300px 83px; }

      @keyframes pmBsHexIn      { to { opacity: 1; transform: scale(1); } }
      @keyframes pmBsFadeIn     { to { opacity: 1; } }
      @keyframes pmBsLensPop {
        0%   { opacity: 0; transform: scale(.4); }
        60%  { opacity: 1; transform: scale(1.06); }
        100% { opacity: 1; transform: scale(1); }
      }
      @keyframes pmBsBorderDraw { to { opacity: .95; stroke-dashoffset: 0; } }
      @keyframes pmBsNotchPop   { to { opacity: 1; transform: scale(1); } }

      .pm-bs-wordmark {
        font-size: 42px;
        font-weight: 800;
        letter-spacing: -0.035em;
        line-height: 1;
        color: #f4f7ff;
        opacity: 0;
        transform: translateY(8px);
        animation: pmBsWordIn 0.5s 1.35s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        z-index: 1;
      }
      .pm-bs-blue { color: #5599ff; }
      @keyframes pmBsWordIn { to { opacity: 1; transform: translateY(0); } }

      .pm-bs-tagline {
        font-family: 'IBM Plex Mono', ui-monospace, monospace;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: #38d8ff;
        opacity: 0;
        animation: pmBsFadeIn 0.5s 1.7s ease-out forwards;
        z-index: 1;
      }
      .pm-bs-loader {
        width: 150px;
        height: 3px;
        background: rgba(255,255,255,0.08);
        border-radius: 999px;
        overflow: hidden;
        position: relative;
        opacity: 0;
        animation: pmBsFadeIn 0.4s 1.9s ease-out forwards;
        z-index: 1;
      }
      .pm-bs-loader span {
        position: absolute;
        top: 0;
        left: 0;
        height: 100%;
        width: 40%;
        background: linear-gradient(90deg, #38d8ff, #4f63ff);
        border-radius: 999px;
        animation: pmBsSlide 1.6s 2.0s ease-in-out infinite;
      }
      @keyframes pmBsSlide {
        0%   { transform: translateX(-120%); }
        100% { transform: translateX(360%); }
      }
    </style>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Color+Emoji&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Splash sits ABOVE #root so React mounts and runs underneath it.
         Ensures the user can't see the React app until we explicitly fade
         the splash out. -->
    <div id="pm-boot-splash" aria-label="PreeceMeet">
      <div class="pm-bs-mark-wrap">
        <div class="pm-bs-halo"></div>
        <svg width="180" height="180" viewBox="0 0 512 512" aria-hidden="true" style="position:relative;filter:drop-shadow(0 18px 38px #0008)">
          <defs>
            <linearGradient id="pmBsCell" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0"  stop-color="#05091f" />
              <stop offset="1"  stop-color="#0a0e2e" />
            </linearGradient>
            <linearGradient id="pmBsBorder" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0"   stop-color="#38d8ff" />
              <stop offset=".5"  stop-color="#4488ff" />
              <stop offset="1"   stop-color="#3355dd" />
            </linearGradient>
            <linearGradient id="pmBsLens" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0"   stop-color="#a8eeff" />
              <stop offset=".5"  stop-color="#5599ff" />
              <stop offset="1"   stop-color="#3366ee" />
            </linearGradient>
            <filter id="pmBsGlow"  x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="7"/></filter>
            <filter id="pmBsBloom" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="7"/></filter>
            <clipPath id="pmBsHexClip"><path d="M438 225 L374 114 Q356 83 320 83 L192 83 Q156 83 138 114 L74 225 Q56 256 74 287 L138 398 Q156 429 192 429 L320 429 Q356 429 374 398 L438 287 Q456 256 438 225 Z"/></clipPath>
          </defs>

          <path class="pm-bs-hex-body"
                d="M438 225 L374 114 Q356 83 320 83 L192 83 Q156 83 138 114 L74 225 Q56 256 74 287 L138 398 Q156 429 192 429 L320 429 Q356 429 374 398 L438 287 Q456 256 438 225 Z"
                fill="url(#pmBsCell)" />

          <g class="pm-bs-circuit" clip-path="url(#pmBsHexClip)" fill="none" stroke="#38d8ff">
            <path d="M180 70 V452" stroke-width="1" opacity=".07"/>
            <path d="M256 60 V452" stroke-width="1" opacity=".07"/>
            <path d="M332 70 V452" stroke-width="1" opacity=".07"/>
            <path d="M60 180 H452" stroke-width="1" opacity=".05"/>
            <path d="M60 332 H452" stroke-width="1" opacity=".05"/>
            <path d="M104 300 H150 V132" stroke-width="2.6" opacity=".34"/>
            <path d="M408 214 H360 V344" stroke-width="2.6" opacity=".34"/>
            <path d="M150 372 H214" stroke-width="2.6" opacity=".3"/>
            <path d="M362 372 H304" stroke-width="2.6" opacity=".28"/>
            <circle cx="150" cy="132" r="6" fill="#38d8ff" opacity=".85"/>
            <circle cx="360" cy="344" r="6" fill="#4488ff" opacity=".85"/>
            <circle cx="214" cy="372" r="5" fill="#38d8ff" opacity=".7"/>
            <circle cx="304" cy="372" r="5" fill="#4488ff" opacity=".7"/>
          </g>

          <g class="pm-bs-lens">
            <g filter="url(#pmBsBloom)" opacity=".55">
              <rect x="150" y="196" width="150" height="120" rx="26" fill="url(#pmBsLens)"/>
              <path d="M312 226 L372 196 L372 316 L312 286 Z" fill="url(#pmBsLens)"/>
            </g>
            <rect x="150" y="196" width="150" height="120" rx="26" fill="url(#pmBsLens)"/>
            <path d="M312 226 L372 196 L372 316 L312 286 Z" fill="url(#pmBsLens)"/>
            <circle cx="200" cy="256" r="30" fill="none" stroke="#0a1230" stroke-width="10" opacity=".4"/>
            <circle cx="272" cy="228" r="7" fill="#0a1230" opacity=".45"/>
          </g>

          <path class="pm-bs-hex-border"
                d="M438 225 L374 114 Q356 83 320 83 L192 83 Q156 83 138 114 L74 225 Q56 256 74 287 L138 398 Q156 429 192 429 L320 429 Q356 429 374 398 L438 287 Q456 256 438 225 Z"
                fill="none" stroke="url(#pmBsBorder)" stroke-width="12" filter="url(#pmBsGlow)" opacity=".8" />
          <path class="pm-bs-hex-border"
                d="M438 225 L374 114 Q356 83 320 83 L192 83 Q156 83 138 114 L74 225 Q56 256 74 287 L138 398 Q156 429 192 429 L320 429 Q356 429 374 398 L438 287 Q456 256 438 225 Z"
                fill="none" stroke="url(#pmBsBorder)" stroke-width="5" />

          <circle class="pm-bs-notch pm-bs-notch-1" cx="212" cy="83" r="7" fill="#38d8ff"/>
          <circle class="pm-bs-notch pm-bs-notch-2" cx="256" cy="83" r="7" fill="#4488ff"/>
          <circle class="pm-bs-notch pm-bs-notch-3" cx="300" cy="83" r="7" fill="#3355dd"/>
        </svg>
      </div>
      <div class="pm-bs-wordmark">Preece<span class="pm-bs-blue">Meet</span></div>
      <div class="pm-bs-tagline">Joining room</div>
      <div class="pm-bs-loader"><span></span></div>
    </div>

    <div id="root"></div>

    <script>
      // Reveal the (currently hidden) Electron window now that the splash
      // is in the DOM and the body background is dark. Two rAFs ensure the
      // first frame is committed before we ask main to show().
      requestAnimationFrame(function () {
        requestAnimationFrame(function () {
          try { window.preecemeet && window.preecemeet.appReady && window.preecemeet.appReady(); } catch (e) {}
        });
      });

      // Hold the splash for at least 4 seconds, then fade and remove.
      // Independent of React — guarantees a consistent boot experience.
      setTimeout(function () {
        var s = document.getElementById('pm-boot-splash');
        if (!s) return;
        s.classList.add('fade');
        s.addEventListener('transitionend', function () { s.remove(); }, { once: true });
      }, 4000);
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
