<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="PreeceMeet">
  <defs>
    <linearGradient id="pmCell" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#05091F"/>
      <stop offset="1" stop-color="#0A0E2E"/>
    </linearGradient>
    <linearGradient id="pmBorder" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"  stop-color="#38D8FF"/>
      <stop offset=".5" stop-color="#4488FF"/>
      <stop offset="1"  stop-color="#3355DD"/>
    </linearGradient>
    <linearGradient id="pmLens" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"  stop-color="#A8EEFF"/>
      <stop offset=".5" stop-color="#5599FF"/>
      <stop offset="1"  stop-color="#3366EE"/>
    </linearGradient>
    <filter id="pmGlow"  x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="7"/></filter>
    <filter id="pmBloom" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="7"/></filter>
    <clipPath id="pmHex"><path d="M438 225 L374 114 Q356 83 320 83 L192 83 Q156 83 138 114 L74 225 Q56 256 74 287 L138 398 Q156 429 192 429 L320 429 Q356 429 374 398 L438 287 Q456 256 438 225 Z"/></clipPath>
  </defs>

  <!-- hex cell body -->
  <path d="M438 225 L374 114 Q356 83 320 83 L192 83 Q156 83 138 114 L74 225 Q56 256 74 287 L138 398 Q156 429 192 429 L320 429 Q356 429 374 398 L438 287 Q456 256 438 225 Z" fill="url(#pmCell)"/>

  <!-- circuit field -->
  <g clip-path="url(#pmHex)" fill="none" stroke="#38D8FF">
    <path d="M180 70 V452" stroke-width="1" opacity=".07"/>
    <path d="M218 64 V452" stroke-width="1" opacity=".05"/>
    <path d="M256 60 V452" stroke-width="1" opacity=".07"/>
    <path d="M294 64 V452" stroke-width="1" opacity=".05"/>
    <path d="M332 70 V452" stroke-width="1" opacity=".07"/>
    <path d="M60 180 H452" stroke-width="1" opacity=".05"/>
    <path d="M60 256 H452" stroke-width="1" opacity=".06"/>
    <path d="M60 332 H452" stroke-width="1" opacity=".05"/>
    <path d="M104 300 H150 V132" stroke-width="2.6" opacity=".34"/>
    <path d="M408 214 H360 V344" stroke-width="2.6" opacity=".34"/>
    <path d="M150 372 H214" stroke-width="2.6" opacity=".3"/>
    <path d="M362 372 H304" stroke-width="2.6" opacity=".28"/>
    <path d="M256 452 V400" stroke-width="2.4" opacity=".26"/>
    <path d="M256 70 V116"  stroke-width="2.2" opacity=".26"/>
    <rect x="242" y="116" width="20" height="13" rx="2" stroke="none" fill="#38D8FF" opacity=".34"/>
    <circle cx="150" cy="132" r="6" fill="#38D8FF" opacity=".85"/>
    <circle cx="360" cy="344" r="6" fill="#4488FF" opacity=".85"/>
    <circle cx="214" cy="372" r="5" fill="#38D8FF" opacity=".7"/>
    <circle cx="304" cy="372" r="5" fill="#4488FF" opacity=".7"/>
    <circle cx="104" cy="300" r="5" fill="#38D8FF" opacity=".65"/>
    <circle cx="408" cy="214" r="5" fill="#4488FF" opacity=".65"/>
  </g>

  <!-- video camera glyph (bloom + solid) -->
  <g filter="url(#pmBloom)" opacity=".6">
    <rect x="150" y="196" width="150" height="120" rx="26" fill="url(#pmLens)"/>
    <path d="M312 226 L372 196 L372 316 L312 286 Z" fill="url(#pmLens)"/>
  </g>
  <rect x="150" y="196" width="150" height="120" rx="26" fill="url(#pmLens)"/>
  <path d="M312 226 L372 196 L372 316 L312 286 Z" fill="url(#pmLens)"/>
  <circle cx="200" cy="256" r="30" fill="none" stroke="#0A1230" stroke-width="10" opacity=".4"/>
  <circle cx="272" cy="228" r="7" fill="#0A1230" opacity=".45"/>

  <!-- hex border (glow + crisp) -->
  <path d="M438 225 L374 114 Q356 83 320 83 L192 83 Q156 83 138 114 L74 225 Q56 256 74 287 L138 398 Q156 429 192 429 L320 429 Q356 429 374 398 L438 287 Q456 256 438 225 Z" fill="none" stroke="url(#pmBorder)" stroke-width="12" filter="url(#pmGlow)" opacity=".82"/>
  <path d="M438 225 L374 114 Q356 83 320 83 L192 83 Q156 83 138 114 L74 225 Q56 256 74 287 L138 398 Q156 429 192 429 L320 429 Q356 429 374 398 L438 287 Q456 256 438 225 Z" fill="none" stroke="url(#pmBorder)" stroke-width="5"/>

  <!-- top notch dots -->
  <circle cx="212" cy="83" r="7" fill="#38D8FF"/>
  <circle cx="256" cy="83" r="7" fill="#4488FF"/>
  <circle cx="300" cy="83" r="7" fill="#3355DD"/>
</svg>
