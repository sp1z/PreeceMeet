app-id: com.russellpreece.PreeceMeet
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: preecemeet

finish-args:
  # GUI + windowing
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  # Network access for LiveKit signalling, AuthApi and the auto-updater check
  - --share=network
  # Audio in/out
  - --socket=pulseaudio
  # Camera + microphone (raw device access — also covered by portals)
  - --device=all
  # File access
  - --filesystem=xdg-download
  - --filesystem=xdg-config/PreeceMeet:create
  # Portals for screen share, file picker, notifications, browser opener
  - --talk-name=org.freedesktop.portal.*
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.freedesktop.FileManager1

modules:
  - name: preecemeet
    buildsystem: simple
    build-commands:
      - mkdir -p extracted
      - ar x preecemeet.deb
      - tar xf data.tar.* -C extracted
      # Binary
      - install -Dm755 extracted/usr/bin/preecemeet /app/bin/preecemeet
      # Desktop file — rename to app-id, fix Exec/Icon to match
      - install -Dm644 extracted/usr/share/applications/PreeceMeet.desktop /app/share/applications/com.russellpreece.PreeceMeet.desktop
      - sed -i 's|^Exec=.*|Exec=preecemeet|; s|^Icon=.*|Icon=com.russellpreece.PreeceMeet|' /app/share/applications/com.russellpreece.PreeceMeet.desktop
      # Icons — rename each to the app-id
      - |
        for d in extracted/usr/share/icons/hicolor/*/apps; do
          sz=$(basename $(dirname "$d"))
          src="$d/preecemeet.png"
          if [ -f "$src" ]; then
            install -Dm644 "$src" "/app/share/icons/hicolor/$sz/apps/com.russellpreece.PreeceMeet.png"
          fi
        done
    sources:
      - type: file
        path: preecemeet.deb
