name: Build & Deploy Auth API

on:
  push:
    branches: [main]
    paths:
      - 'PreeceMeet.AuthApi/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/sp1z/preecemeet-auth

jobs:
  build-and-push:
    name: Build Docker image and push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./PreeceMeet.AuthApi
          file: ./PreeceMeet.AuthApi/Dockerfile
          push: true
          tags: ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy on hosting-1
    runs-on: [self-hosted, linux, deploy]
    needs: build-and-push

    steps:
      - name: Pull and restart auth-api
        run: |
          cd /opt/preecemeet
          docker compose pull auth-api
          docker compose up -d auth-api
