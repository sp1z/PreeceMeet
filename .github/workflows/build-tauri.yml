name: Build & Release Tauri Client

on:
  push:
    branches: [main]
    paths:
      - 'PreeceMeet.Tauri/**'
      - '.github/workflows/build-tauri.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            runner: [self-hosted, Linux, tauri]
            args: ''
          - os: windows
            runner: [self-hosted, Windows, tauri]
            args: ''
          - os: macos
            runner: [self-hosted, macOS, tauri]
            args: '--target aarch64-apple-darwin'
          - os: macos
            runner: [self-hosted, macOS, tauri]
            args: '--target x86_64-apple-darwin'

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.os == 'macos' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Generate app icon
        shell: python3 {0}
        run: |
          import struct, zlib, os
          os.makedirs('PreeceMeet.Tauri/src-tauri/icons', exist_ok=True)

          def make_png(size, r=91, g=155, b=213):
              def chunk(name, data):
                  crc = zlib.crc32(name + data) & 0xffffffff
                  return struct.pack('>I', len(data)) + name + data + struct.pack('>I', crc)
              scanline = bytes([0] + [r, g, b] * size)
              raw = scanline * size
              return (b'\x89PNG\r\n\x1a\n' +
                      chunk(b'IHDR', struct.pack('>IIBBBBB', size, size, 8, 2, 0, 0, 0)) +
                      chunk(b'IDAT', zlib.compress(raw)) +
                      chunk(b'IEND', b''))

          with open('PreeceMeet.Tauri/src-tauri/icons/app-source.png', 'wb') as f:
              f.write(make_png(512))

      - name: Install frontend dependencies
        working-directory: PreeceMeet.Tauri
        run: npm install

      - name: Generate all icon sizes
        working-directory: PreeceMeet.Tauri
        run: npx tauri icon src-tauri/icons/app-source.png

      - name: Build and release with Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN:                    ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY:       ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
          # Ad-hoc signing prevents macOS from reporting the app as "damaged".
          # Users will still see an "unidentified developer" Gatekeeper prompt
          # on first launch; right-click → Open bypasses it.
          APPLE_SIGNING_IDENTITY:          ${{ matrix.os == 'macos' && '-' || '' }}
        with:
          projectPath: PreeceMeet.Tauri
          tagName: tauri-v__VERSION__
          releaseName: 'PreeceMeet (cross-platform) v__VERSION__'
          releaseBody: |
            Cross-platform PreeceMeet built with Tauri + LiveKit JS SDK.

            **Downloads:**
            - Windows: `.msi` or `.exe` setup
            - Linux: `.AppImage` or `.deb`
            - macOS: `.dmg`
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      # tauri-action DELETES .sig files on all platforms after failing to build updater JSON.
      # We re-sign the final archives and upload the .sig files ourselves.
      - name: Upload updater signatures
        shell: python3 {0}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
        run: |
          import json, os, subprocess, tempfile, shutil

          version = json.load(open("PreeceMeet.Tauri/src-tauri/tauri.conf.json"))["version"]
          tag  = f"tauri-v{version}"
          repo = "${{ github.repository }}"
          args = "${{ matrix.args }}"
          tgt  = "PreeceMeet.Tauri/src-tauri/target"
          # On Windows, npx is a .cmd script and needs the extension
          npx  = "npx.cmd" if os.name == "nt" else "npx"

          def sign(archive_path):
              """Re-sign archive with TAURI_SIGNING_PRIVATE_KEY; returns .sig path or None."""
              abs_path = os.path.abspath(archive_path)
              if not os.path.exists(abs_path):
                  print(f"Archive not found (cannot sign): {archive_path}")
                  return None
              print(f"Signing {archive_path} ...")
              r = subprocess.run(
                  [npx, "--yes", "tauri", "signer", "sign", abs_path],
                  cwd="PreeceMeet.Tauri",
                  capture_output=True, text=True,
              )
              sig_path = abs_path + ".sig"
              if r.returncode == 0 and os.path.exists(sig_path):
                  print(f"  Signature written: {sig_path}")
                  return sig_path
              print(f"  Signing failed (rc={r.returncode}):\n{r.stdout}\n{r.stderr}")
              return None

          def upload(src, dest_name=None):
              if dest_name is None:
                  dest_name = os.path.basename(src)
              if not os.path.exists(src):
                  print(f"Not found (skipping): {src}")
                  return
              print(f"Uploading {dest_name} ...")
              tmp = tempfile.mkdtemp()
              dst = os.path.join(tmp, dest_name)
              shutil.copy2(src, dst)
              subprocess.run(
                  ["gh", "release", "upload", tag, dst, "--clobber", "--repo", repo],
                  check=True,
              )

          def sign_upload_sig_only(archive, sig_name):
              """Sign archive, upload only the .sig (archive already uploaded by tauri-action)."""
              sig = sign(archive)
              if sig:
                  upload(sig, sig_name)

          def sign_and_upload(archive, archive_name, sig_name):
              """Sign archive, upload both the archive and the .sig."""
              sig = sign(archive)
              if sig:
                  upload(archive, archive_name)
                  upload(sig, sig_name)

          if "aarch64-apple-darwin" in args:
              # tauri-action repacks the .app → re-sign the repacked archive
              base = f"{tgt}/aarch64-apple-darwin/release/bundle/macos"
              sign_and_upload(f"{base}/PreeceMeet.app.tar.gz",
                              "PreeceMeet_aarch64.app.tar.gz",
                              "PreeceMeet_aarch64.app.tar.gz.sig")
          elif "x86_64-apple-darwin" in args:
              base = f"{tgt}/x86_64-apple-darwin/release/bundle/macos"
              sign_and_upload(f"{base}/PreeceMeet.app.tar.gz",
                              "PreeceMeet_x64.app.tar.gz",
                              "PreeceMeet_x64.app.tar.gz.sig")
          elif os.name != "nt":  # Linux
              # Tauri v2: updater uses .AppImage directly; tauri-action uploads it but
              # deletes the .sig. Re-sign and upload just the sig.
              base = f"{tgt}/release/bundle/appimage"
              sign_upload_sig_only(f"{base}/PreeceMeet_{version}_amd64.AppImage",
                                   f"PreeceMeet_{version}_amd64.AppImage.sig")
          else:  # Windows
              # tauri-action deletes .nsis.zip (and .sig). Recreate the zip from the
              # .exe installer, then sign and upload it.
              import zipfile
              nsis_dir = f"{tgt}/release/bundle/nsis"
              exe      = f"{nsis_dir}/PreeceMeet_{version}_x64-setup.exe"
              zip_path = f"{nsis_dir}/PreeceMeet_{version}_x64-setup.nsis.zip"
              if os.path.exists(exe):
                  print(f"Creating {zip_path} ...")
                  with zipfile.ZipFile(zip_path, "w", zipfile.ZIP_DEFLATED) as zf:
                      zf.write(exe, os.path.basename(exe))
                  sign_and_upload(zip_path,
                                  f"PreeceMeet_{version}_x64-setup.nsis.zip",
                                  f"PreeceMeet_{version}_x64-setup.nsis.zip.sig")
              else:
                  print(f"NSIS exe not found: {exe}")

  # After all platforms built, generate latest.json for the auto-updater
  # and commit it to main so the endpoint URL always returns the newest version.
  generate-updater-json:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version
        id: ver
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('PreeceMeet.Tauri/src-tauri/tauri.conf.json'))['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download .sig files from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/sigs
          VERSION=${{ steps.ver.outputs.version }}
          TAG="tauri-v${VERSION}"
          # Download all .sig assets — gh will skip ones that don't exist
          gh release download "$TAG" --repo ${{ github.repository }} \
            --pattern "*.sig" --dir /tmp/sigs || true
          ls /tmp/sigs/

      - name: Generate latest.json
        run: |
          python3 - << 'EOF'
          import json, os, glob
          from datetime import datetime, timezone

          version = "${{ steps.ver.outputs.version }}"
          tag     = f"tauri-v{version}"
          base    = f"https://github.com/${{ github.repository }}/releases/download/{tag}"

          def sig(name):
              path = f"/tmp/sigs/{name}.sig"
              return open(path).read().strip() if os.path.exists(path) else None

          platforms = {}

          # Windows — NSIS updater zip (prefer NSIS over MSI)
          nsis = f"PreeceMeet_{version}_x64-setup.nsis.zip"
          s = sig(nsis)
          if s:
              platforms["windows-x86_64"] = {"url": f"{base}/{nsis}", "signature": s}
          else:
              msi = f"PreeceMeet_{version}_x64_en-US.msi.zip"
              s = sig(msi)
              if s:
                  platforms["windows-x86_64"] = {"url": f"{base}/{msi}", "signature": s}

          # Linux — AppImage (Tauri v2 uses .AppImage directly, not .AppImage.tar.gz)
          ai_name = f"PreeceMeet_{version}_amd64.AppImage"
          sig_path = f"/tmp/sigs/{ai_name}.sig"
          if os.path.exists(sig_path):
              platforms["linux-x86_64"] = {
                  "url": f"{base}/{ai_name}",
                  "signature": open(sig_path).read().strip(),
              }

          # macOS
          for arch, key in [("aarch64", "darwin-aarch64"), ("x64", "darwin-x86_64")]:
              name = f"PreeceMeet_{arch}.app.tar.gz"
              s = sig(name)
              if s:
                  platforms[key] = {"url": f"{base}/{name}", "signature": s}

          manifest = {
              "version":  version,
              "notes":    f"PreeceMeet (cross-platform) v{version}",
              "pub_date": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "platforms": platforms,
          }

          out = json.dumps(manifest, indent=2)
          print(out)
          with open("PreeceMeet.Tauri/latest.json", "w") as f:
              f.write(out + "\n")

          print(f"\nPlatforms included: {list(platforms.keys())}")
          EOF

      - name: Commit latest.json to main
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add PreeceMeet.Tauri/latest.json
          if git diff --cached --quiet; then
            echo "latest.json unchanged, nothing to commit"
          else
            git commit -m "chore: update Tauri auto-updater manifest to v${{ steps.ver.outputs.version }}"
            git pull --rebase
            git push
          fi

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "tauri-v${{ steps.ver.outputs.version }}" \
            --repo ${{ github.repository }} \
            --draft=false
