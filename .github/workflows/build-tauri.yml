name: Build & Release Tauri Client

on:
  push:
    branches: [main]
    paths:
      - 'PreeceMeet.Tauri/**'
      - '.github/workflows/build-tauri.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Generate app icon
        shell: python3 {0}
        run: |
          import struct, zlib, os
          os.makedirs('PreeceMeet.Tauri/src-tauri/icons', exist_ok=True)

          def make_png(size, r=91, g=155, b=213):
              def chunk(name, data):
                  crc = zlib.crc32(name + data) & 0xffffffff
                  return struct.pack('>I', len(data)) + name + data + struct.pack('>I', crc)
              scanline = bytes([0] + [r, g, b] * size)
              raw = scanline * size
              return (b'\x89PNG\r\n\x1a\n' +
                      chunk(b'IHDR', struct.pack('>IIBBBBB', size, size, 8, 2, 0, 0, 0)) +
                      chunk(b'IDAT', zlib.compress(raw)) +
                      chunk(b'IEND', b''))

          with open('PreeceMeet.Tauri/src-tauri/icons/app-source.png', 'wb') as f:
              f.write(make_png(512))

      - name: Install frontend dependencies
        working-directory: PreeceMeet.Tauri
        run: npm install

      - name: Generate all icon sizes
        working-directory: PreeceMeet.Tauri
        run: npx tauri icon src-tauri/icons/app-source.png

      - name: Build and release with Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN:                    ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY:       ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
        with:
          projectPath: PreeceMeet.Tauri
          tagName: tauri-v__VERSION__
          releaseName: 'PreeceMeet (cross-platform) v__VERSION__'
          releaseBody: |
            Cross-platform PreeceMeet built with Tauri + LiveKit JS SDK.

            **Downloads:**
            - Windows: `.msi` or `.exe` setup
            - Linux: `.AppImage` or `.deb`
            - macOS: `.dmg`
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      # tauri-action doesn't upload .sig files as release assets — do it explicitly.
      # Uses direct known paths per platform (avoids cross-platform find issues).
      - name: Upload updater signatures
        shell: python3 {0}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          import json, os, subprocess, tempfile, shutil

          version = json.load(open("PreeceMeet.Tauri/src-tauri/tauri.conf.json"))["version"]
          tag  = f"tauri-v{version}"
          repo = "${{ github.repository }}"
          args = "${{ matrix.args }}"

          tgt = "PreeceMeet.Tauri/src-tauri/target"

          def upload(src, dest_name=None):
              if dest_name is None:
                  dest_name = os.path.basename(src)
              if not os.path.exists(src):
                  print(f"Not found (skipping): {src}")
                  return
              print(f"Uploading {dest_name} ...")
              tmp = tempfile.mkdtemp()
              dst = os.path.join(tmp, dest_name)
              shutil.copy2(src, dst)
              subprocess.run(
                  ["gh", "release", "upload", tag, dst, "--clobber", "--repo", repo],
                  check=True
              )

          if "aarch64-apple-darwin" in args:
              base = f"{tgt}/aarch64-apple-darwin/release/bundle/macos"
              upload(f"{base}/PreeceMeet.app.tar.gz",     "PreeceMeet_aarch64.app.tar.gz")
              upload(f"{base}/PreeceMeet.app.tar.gz.sig", "PreeceMeet_aarch64.app.tar.gz.sig")
          elif "x86_64-apple-darwin" in args:
              base = f"{tgt}/x86_64-apple-darwin/release/bundle/macos"
              upload(f"{base}/PreeceMeet.app.tar.gz",     "PreeceMeet_x64.app.tar.gz")
              upload(f"{base}/PreeceMeet.app.tar.gz.sig", "PreeceMeet_x64.app.tar.gz.sig")
          elif os.name != "nt":  # Linux
              base = f"{tgt}/release/bundle/appimage"
              upload(f"{base}/PreeceMeet_{version}_amd64.AppImage.tar.gz")
              upload(f"{base}/PreeceMeet_{version}_amd64.AppImage.tar.gz.sig")
          else:  # Windows
              nsis = f"{tgt}/release/bundle/nsis"
              msi  = f"{tgt}/release/bundle/msi"
              upload(f"{nsis}/PreeceMeet_{version}_x64-setup.nsis.zip")
              upload(f"{nsis}/PreeceMeet_{version}_x64-setup.nsis.zip.sig")
              upload(f"{msi}/PreeceMeet_{version}_x64_en-US.msi.zip")
              upload(f"{msi}/PreeceMeet_{version}_x64_en-US.msi.zip.sig")

  # After all platforms built, generate latest.json for the auto-updater
  # and commit it to main so the endpoint URL always returns the newest version.
  generate-updater-json:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version
        id: ver
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('PreeceMeet.Tauri/src-tauri/tauri.conf.json'))['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download .sig files from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/sigs
          VERSION=${{ steps.ver.outputs.version }}
          TAG="tauri-v${VERSION}"
          # Download all .sig assets — gh will skip ones that don't exist
          gh release download "$TAG" --repo ${{ github.repository }} \
            --pattern "*.sig" --dir /tmp/sigs || true
          ls /tmp/sigs/

      - name: Generate latest.json
        run: |
          python3 - << 'EOF'
          import json, os, glob
          from datetime import datetime, timezone

          version = "${{ steps.ver.outputs.version }}"
          tag     = f"tauri-v{version}"
          base    = f"https://github.com/${{ github.repository }}/releases/download/{tag}"

          def sig(name):
              path = f"/tmp/sigs/{name}.sig"
              return open(path).read().strip() if os.path.exists(path) else None

          platforms = {}

          # Windows — prefer NSIS updater zip
          nsis = f"PreeceMeet_{version}_x64-setup.nsis.zip"
          s = sig(nsis)
          if s:
              platforms["windows-x86_64"] = {"url": f"{base}/{nsis}", "signature": s}
          else:
              msi = f"PreeceMeet_{version}_x64_en-US.msi.zip"
              s = sig(msi)
              if s:
                  platforms["windows-x86_64"] = {"url": f"{base}/{msi}", "signature": s}

          # Linux — AppImage
          ai = f"PreeceMeet_{version}_amd64.AppImage.tar.gz"
          s = sig(ai)
          if s:
              platforms["linux-x86_64"] = {"url": f"{base}/{ai}", "signature": s}

          # macOS
          for arch, key in [("aarch64", "darwin-aarch64"), ("x64", "darwin-x86_64")]:
              name = f"PreeceMeet_{arch}.app.tar.gz"
              s = sig(name)
              if s:
                  platforms[key] = {"url": f"{base}/{name}", "signature": s}

          manifest = {
              "version":  version,
              "notes":    f"PreeceMeet (cross-platform) v{version}",
              "pub_date": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "platforms": platforms,
          }

          out = json.dumps(manifest, indent=2)
          print(out)
          with open("PreeceMeet.Tauri/latest.json", "w") as f:
              f.write(out + "\n")

          print(f"\nPlatforms included: {list(platforms.keys())}")
          EOF

      - name: Commit latest.json to main
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add PreeceMeet.Tauri/latest.json
          if git diff --cached --quiet; then
            echo "latest.json unchanged, nothing to commit"
          else
            git commit -m "chore: update Tauri auto-updater manifest to v${{ steps.ver.outputs.version }}"
            git push
          fi
